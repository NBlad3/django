{% extends "myapp/base.html" %}

{% block content %}
<div class="d-flex gap-3 mb-4 overflow-auto p-2" style="scrollbar-width: none; -ms-overflow-style: none;">
  <div class="text-center" style="flex: 0 0 auto; width: 75px;">
    <div class="story-ring mb-1">
      <img src="" class="rounded-circle border border-2 border-white shadow-sm" width="62" height="62" style="object-fit: cover;" />
    </div>
    <a href="" class="text-decoration-none text-dark">
      <small class="d-block text-truncate" style="font-size: 12px; color: #262626;">
      </small>
    </a>
  </div>
</div>

<div class="card mb-4 border-0 shadow-sm">
  <div class="card-header bg-white d-flex align-items-center gap-2 border-0 py-3">
    <a href="" class="text-decoration-none text-dark d-flex align-items-center gap-2">
      <img src="" class="rounded-circle" width="32" height="32" style="object-fit: cover;" />
      <b style="font-size: 14px;"></b>
    </a>
  </div>

  <img src="" class="card-img-top rounded-0" />

  <div class="card-body">
    <div class="fs-4 mb-2">
      <i class="bi bi-heart me-3" style="cursor: pointer;"></i>
      <i class="bi bi-chat me-3" style="cursor: pointer;"></i>
      <i class="bi bi-send" style="cursor: pointer;"></i>
    </div>

    <p class="mb-1">
      <span class="fw-bold"></span> 
    </p>
    <small class="text-muted text-uppercase" style="font-size: 10px;">trước</small>
  </div>
</div>
{% endblock %}
